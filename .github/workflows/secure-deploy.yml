name: "Deploy with Security Checks"

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  actions: read
  security-events: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  psv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      app_info: ${{ steps.sv.outputs.app_info }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate app_info.json
        id: sv
        env:

 
          APPINFO_R2_BUCKET: ${{ secrets.R2_BUCKET }}
          APPINFO_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }} # yahyeapps
          APPINFO_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          APPINFO_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  

          APPINFO_R2_ACCOUNT_ID_B: ${{ secrets.R2_ACCOUNT_ID_B }}
          APPINFO_R2_BUCKET_B: ${{ secrets.BACKUP_BACKET_NAME }} # yahyeapps
          APPINFO_AWS_ACCESS_KEY_ID_B: ${{ secrets.S3_ACCESS_KEY_ID_B }}
          APPINFO_AWS_SECRET_ACCESS_KEY_B: ${{ secrets.S3_SECRET_ACCESS_KEY_B }}
  
          APPINFO_HOSTNAME: ${{ vars.HOSTNAME }}
          APPINFO_NAMESPACE: ${{ vars.NAMESPACE }}
          APPINFO_APP_NAME: ${{ vars.APP_NAME }}
 
          APPINFO_SCANNER_PAT_TOKEN: ${{ secrets.SCANNER_PAT_TOKEN }}
          APPINFO_DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          APPINFO_DOCKER_PAT_TOKEN: ${{ secrets.DOCKER_PAT_TOKEN }}
          APPINFO_DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
          APPINFO_SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          APPINFO_COMMIT_SHA: ${{github.sha}}
    
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import os

          PREFIX = "APPINFO_"

          env = {
              key[len(PREFIX):]: value
              for key, value in os.environ.items()
              if key.startswith(PREFIX)
          }

          app_info = { 'ENV': env }
          # INCLUDE IMAGE 
          app_info['ENV']['IMAGE'] = app_info['ENV']['DOCKER_REPO'] + ":" + app_info['ENV']['APP_NAME'] + "-" + app_info['ENV']['COMMIT_SHA']


          with open("/tmp/app_info.json", "w") as f:
              json.dump(app_info, f, indent=2, sort_keys=True)
          PYTHON_EOF

          {
            echo "app_info<<APPINFO_DELIMITER"
            cat /tmp/app_info.json
            echo "APPINFO_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Upload app_info.json
        uses: actions/upload-artifact@v4
        with:
          name: app_info
          path: /tmp/app_info.json

    # 4️⃣ Snyk Security Scan
  snyk-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

 
      - name: Install dependencies
        run: |
         corepack enable
         corepack prepare yarn@4.9.2 --activate
         yarn install

      - name: Install Snyk
        run: npm install snyk -g 

      - name: Verify Snyk Token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "❌ SNYK_TOKEN is not configured. Please set it in GitHub Secrets."
            exit 1
          fi
          echo "✅ SNYK_TOKEN is configured"

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

      - name: Snyk monitor (upload results)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor

  # ----------------------------
  # 1️⃣ Socket Security Scan
  # ----------------------------
  socket-scan:
    runs-on: ubuntu-latest
    needs: [snyk-scan]
    timeout-minutes: 20 # Maximum running time for this job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Socket
        run: |
          npm install -g socket

  
      - name: Install dependencies
        run: |
         corepack enable
         corepack prepare yarn@4.9.2 --activate
         yarn install
         
      - name: Run Socket Scan
        env:
          SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}
        run: socket scan --api-key="$SOCKET_API_KEY" --fail-on=policy

  # ----------------------------
  # 2️⃣ OSV Security Scan
  # ----------------------------
  osv-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Maximum running time for this job
    needs: [snyk-scan, socket-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
         corepack enable
         corepack prepare yarn@4.9.2 --activate
         yarn install


      - name: Install OSV Scanner
        run: |
          curl -L -o osv-scanner https://github.com/google/osv-scanner/releases/download/v2.3.3/osv-scanner_linux_amd64
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Run OSV Scanner
        run: osv-scanner --recursive ./ --format json --output osv-results.json

      - name: Fail if vulnerabilities found
        run: |
          VULN_COUNT=$(jq '[.results[]?.packages[]?.vulnerabilities | length] | add' osv-results.json)
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "❌ Found vulnerabilities"
            exit 1
          else
            echo "✅ No vulnerabilities"
          fi

  # 5️⃣ CodeQL
  # ----------------------------
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Maximum running time for this job
    needs: [osv-security-scan]
    steps:
      - uses: actions/checkout@v4

 
      - name: Install dependencies
        run: |
         corepack enable
         corepack prepare yarn@4.9.2 --activate
         yarn install


      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download CodeQL Bundle
        run: |
          CODEQL_VERSION=2.22.1

          wget -q \
            https://github.com/github/codeql-action/releases/download/codeql-bundle-v${CODEQL_VERSION}/codeql-bundle-linux64.tar.gz \
            -O codeql-bundle-linux64.tar.gz

          mkdir -p codeql
          tar -xzf codeql-bundle-linux64.tar.gz -C codeql --strip-components=1
          echo "$PWD/codeql" >> $GITHUB_PATH

      - name: Create CodeQL Database
        run: |
          codeql database create codeql-db \
            --language=javascript \
            --source-root=. \
            --codescanning-config=./codeql-config.yml

      - name: Run CodeQL Analysis
        run: |
          mkdir -p codeql-results

          codeql database analyze \
            codeql-db \
            --format=sarif-latest \
            --output=codeql-results/results.sarif

      - name: Fail on CodeQL Findings
        run: |
          SARIF=codeql-results/results.sarif

          if [ ! -f "$SARIF" ]; then
            echo "❌ SARIF missing"
            exit 1
          fi

          ALERTS=$(jq '[.runs[].results[]? | select(.level=="error" or .level=="warning")] | length' "$SARIF")

          echo "CodeQL alerts: $ALERTS"

          if [ "$ALERTS" -gt 0 ]; then
            echo "❌ CodeQL detected issues:"

            jq -r '
              .runs[].results[] |
              select(.level=="error" or .level=="warning") |
              "\(.ruleId) [\(.level)] \(.message.text) (\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine))"
            ' "$SARIF"

            exit 1
          fi

          echo "✅ No CodeQL findings"
 


            # ----------------------------
  # 3️⃣ Build & Test
  # ----------------------------
  build_test:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Maximum running time for this job
    needs: [osv-security-scan, codeql]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
 
      - name: Install dependencies and build
        run: |
         corepack enable
         corepack prepare yarn@4.9.2 --activate
         yarn install
         yarn build

         
  # ----------------------------
  # 5️⃣ Docker Build & Push
  # ----------------------------
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Maximum running time for this job
    needs: [codeql]
    steps:
      - uses: actions/checkout@v4
      # download
 
 
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REPO }}:${{ vars.APP_NAME }}-${{ github.sha }}
            ${{ secrets.DOCKER_REPO }}:${{ vars.APP_NAME }}-latest

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker, psv]
   
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list

          sudo apt update
          sudo apt install -y cloudflared

      - name: Create deployment manifest
        run: |
          python3 -m pip install pyyaml -q
          python3 .github/create-kubernets-deployemen.py
        env:
          DEPLOYMENT_TEMPLATE: ${{ github.workspace }}/deployment.template.yml
          APP_INFO: ${{ needs.psv.outputs.app_info }}
          DEPLOY_DIR: ${{ github.workspace }}/deployments

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config <<EOF
          Host deploy-server
            HostName ${{vars.SSH_HOST}}
            User yahyeapps
            port ${{vars.SSH_PORT}} 
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand cloudflared access ssh \
              --hostname %h \
              --service-token-id $CLOUDFLARE_SSH_ACCESS_CLIENT_ID \
              --service-token-secret $CLOUDFLARE_SSH_ACCESS_CLIENT_SECRET
          EOF
        env:
          CLOUDFLARE_SSH_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_SSH_ACCESS_CLIENT_ID }}
          CLOUDFLARE_SSH_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_SSH_ACCESS_CLIENT_SECRET }}

      - name: Test SSH connection
        run: |
          if ! ssh -o BatchMode=yes \
              -o ConnectTimeout=10 \
              deploy-server \
              "echo Connected successfully"
          then
            echo "❌ SSH connection failed."
            exit 1
          fi

      - name: Copy manifest to server
        run: |
          scp deployments/deployment.yml deploy-server:/tmp/deployment.yml

      - name: Deploy
        run: |
          ssh deploy-server \
            "kubectl apply -f /tmp/deployment.yml"
