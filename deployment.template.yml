# deployments template for fallback; contains placeholders {{NAMESPACE}}, {{HOSTNAME}}, {{IMAGE}}

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: "{{NAMESPACE}}"

---
# Kubernetes Secret for environment variables / secrets
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secrets
  namespace: "{{NAMESPACE}}"
type: Opaque
stringData:
  # EXAMPLE_KEY: "example-value"

---
# Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-cert
  namespace: "{{NAMESPACE}}"
spec:
  secretName: app-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "{{HOSTNAME}}"

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-configmap
  namespace: "{{NAMESPACE}}"
data:
  # VAR_KEY: "VAR_VALUE"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: "{{NAMESPACE}}"
  labels:
    app: app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-deployment
  template:
    metadata:
      labels:
        app: app-deployment
    spec:
      containers:
        - name: webhook
          image: "{{IMAGE}}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            # env from configmap and secrets will be injected
      imagePullSecrets:
        - name: my-dockerhub-secret

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: "{{NAMESPACE}}"
  labels:
    app: app-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app: app-deployment

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: "{{NAMESPACE}}"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "{{HOSTNAME}}"
      secretName: app-tls
  rules:
    - host: "{{HOSTNAME}}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
